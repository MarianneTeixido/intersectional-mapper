services:
  - type: web
    name: intersectional-mapper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/intersectional_mapper.db
    disk:
      name: db
      mountPath: /opt/render/project/src
      sizeGB: 1
